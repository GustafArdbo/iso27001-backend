spring:
  application:
    name: iso27001backend

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SUPABASE_JWT_ISSUER}
          jwk-set-uri: ${SUPABASE_JWT_JWK_SET_URI}

server:
  port: ${PORT:8080}

app:
  security:
    platform-admin-user-ids: ${PLATFORM_ADMIN_USER_IDS:}
    cors-allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,https://complypilot.se,https://www.complypilot.se}
  supabase:
    url: ${SUPABASE_URL:}
    secret-key: ${SUPABASE_SECRET_KEY:}
    invite-redirect-url: ${FRONTEND_INVITE_REDIRECT_URL:}
