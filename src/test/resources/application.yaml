spring:
  datasource:
    url: jdbc:h2:mem:iso27001backend;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    enabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: https://test.supabase.co/auth/v1
          jwk-set-uri: https://test.supabase.co/auth/v1/.well-known/jwks.json

app:
  security:
    platform-admin-user-ids: 11111111-1111-4111-8111-111111111111
    cors-allowed-origin-patterns: https://frontend.example.com
  supabase:
    url: https://test.supabase.co
    secret-key: test-secret-key
    invite-redirect-url: https://frontend.example.com/auth/callback
